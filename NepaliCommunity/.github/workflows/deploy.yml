name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  deploy-api:
    name: Deploy .NET API
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore NepaliCommunityApi/NepaliCommunityApi.csproj
      
    - name: Build
      run: dotnet build NepaliCommunityApi/NepaliCommunityApi.csproj --no-restore --configuration Release
      
    - name: Test
      run: dotnet test NepaliCommunityApi/NepaliCommunityApi.csproj --no-build --verbosity normal --configuration Release
      
    - name: Publish
      run: dotnet publish NepaliCommunityApi/NepaliCommunityApi.csproj --no-build --configuration Release --output ./publish/api
      
    - name: Create deployment package
      run: |
        cd publish
        tar -czf api-deployment.tar.gz api/
        
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: api-deployment
        path: ./publish/api-deployment.tar.gz

  deploy-frontend:
    name: Deploy Angular Frontend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: NepaliCommunityUi/package-lock.json
        
    - name: Install dependencies
      run: |
        cd NepaliCommunityUi
        npm ci
        
    - name: Build Angular app
      run: |
        cd NepaliCommunityUi
        npm run build
        
    - name: Create deployment package
      run: |
        cd NepaliCommunityUi
        tar -czf frontend-deployment.tar.gz dist/
        
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: frontend-deployment
        path: NepaliCommunityUi/frontend-deployment.tar.gz

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]
    if: always()
    
    steps:
    - name: Deployment Status
      run: |
        if [ "${{ needs.deploy-api.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
          echo "✅ Deployment completed successfully!"
        else
          echo "❌ Deployment failed!"
          echo "API deployment: ${{ needs.deploy-api.result }}"
          echo "Frontend deployment: ${{ needs.deploy-frontend.result }}"
          exit 1
        fi 