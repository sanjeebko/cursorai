name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-api:
    name: Build and Test .NET API
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore NepaliCommunity/NepaliCommunityApi/NepaliCommunityApi.csproj
      
    - name: Build
      run: dotnet build NepaliCommunity/NepaliCommunityApi/NepaliCommunityApi.csproj --no-restore --configuration Release
      
    - name: Test
      run: dotnet test NepaliCommunity/NepaliCommunityApi/NepaliCommunityApi.csproj --no-build --verbosity normal --configuration Release
      
    - name: Publish
      run: dotnet publish NepaliCommunity/NepaliCommunityApi/NepaliCommunityApi.csproj --no-build --configuration Release --output ./publish/api
      
    - name: Upload API artifacts
      uses: actions/upload-artifact@v4
      with:
        name: api-artifacts
        path: ./publish/api

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: NepaliCommunity/NepaliCommunityUi/package-lock.json
        
    - name: Install dependencies
      run: |
        cd NepaliCommunity/NepaliCommunityUi
        npm ci
        
    - name: Build Angular app
      run: |
        cd NepaliCommunity/NepaliCommunityUi
        npm run build
        
    - name: Upload Frontend artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-artifacts
        path: NepaliCommunity/NepaliCommunityUi/dist

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Run .NET code analysis
      run: |
        dotnet tool install --global dotnet-format
        dotnet format --verify-no-changes NepaliCommunity/NepaliCommunityApi/
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Run ESLint
      run: |
        cd NepaliCommunity/NepaliCommunityUi
        npm ci
        npm run lint 